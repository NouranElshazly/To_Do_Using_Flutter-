name: to_do_app
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.2.3
  intl: ^0.20.3
  lottie: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1

  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Saira
      fonts:
        - asset: assets/fonts/Saira-Regular.ttf

        - asset: assets/fonts/Saira-Bold.ttf

        - asset: assets/fonts/Saira-Medium.ttf

        - asset: assets/fonts/Saira-SemiBold.ttf
